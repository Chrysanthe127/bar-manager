<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Bar Manager - Connexion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" style="max-width: 400px; margin-top: 80px;">
  <h1>🍸 Gestion du Bar</h1>
  <form id="loginForm">
    <input type="text" id="username" placeholder="Nom d'utilisateur" required><br>
    <input type="password" id="password" placeholder="Mot de passe" required><br>
    <button type="submit">Se connecter</button>
  </form>
  <p id="error" style="color:red; margin-top:15px;"></p>
</div>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (res.ok) {
      const data = await res.json();
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      if (data.user.role === 'admin') window.location.href = 'admin.html';
      else if (data.user.role === 'boss') window.location.href = 'boss.html';
      else window.location.href = 'employee.html';
    } else {
      document.getElementById('error').innerText = 'Échec de connexion';
    }
  });
</script>
</body>
</html>
